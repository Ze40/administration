name: docker

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  TEST_IMAGE: "administration-app:test"

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/administration-app:latest" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: docker build -t "$TEST_IMAGE" -t "$GHCR_IMAGE" ./docker

      - name: Start PostgreSQL
        env:
          APP_IMAGE: ${{ env.TEST_IMAGE }}
        run: docker compose -f docker/compose.yaml up -d postgres

      - name: Run tests inside the built image
        env:
          APP_IMAGE: ${{ env.TEST_IMAGE }}
          DATABASE_URL: "postgresql+psycopg://kubsu:kubsu@postgres:5432/kubsu"
        run: docker compose -f docker/compose.yaml run --rm -e DATABASE_URL="$DATABASE_URL" app pytest tests -q

      - name: Stop test services
        if: always()
        run: docker compose -f docker/compose.yaml down -v

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: docker push "$GHCR_IMAGE"
