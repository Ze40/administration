services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kubsu}
      POSTGRES_USER: ${POSTGRES_USER:-kubsu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kubsu}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kubsu} -d ${POSTGRES_DB:-kubsu}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ${APP_IMAGE:-administration-app:test}
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-kubsu}:${POSTGRES_PASSWORD:-kubsu}@postgres:5432/${POSTGRES_DB:-kubsu}
      PORT: ${APP_PORT:-8000}
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    restart: unless-stopped
